version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: poke_db
    restart: always
    environment:
      POSTGRES_DB: pokedb
      POSTGRES_USER: pokeuser
      POSTGRES_PASSWORD: pokepassword
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: